# Puerto de la aplicación
server.port=8081

# Conexión a PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/outbox_db
spring.datasource.username=admin
spring.datasource.password=admin123
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Ya no necesitamos configuración de Kafka aquí porque Debezium publica directamente
# Pero la dejamos por si quieres crear un consumidor después
spring.kafka.bootstrap-servers=localhost:29092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

kafka.topic.outbox=outbox-events-topic

# ==========================================
# Configuración del Consumidor de Kafka
# ==========================================
spring.kafka.consumer.bootstrap-servers=localhost:29092
spring.kafka.consumer.group-id=inventory-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# ==========================================
# Configuración de Dead Letter Queue (DLQ)
# ==========================================
kafka.topic.dlq=outbox-events-topic.DLQ